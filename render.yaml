services:
  - type: web
    name: streetview-video-generator
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: GOOGLE_API_KEY
        sync: false
      - key: RATE_LIMIT_REQUESTS_PER_DAY
        value: 24000
      - key: MAX_ROUTE_DISTANCE_KM
        value: 50
      - key: FRAMES_PER_ROUTE
        value: 200
      - key: VIDEO_FPS
        value: 5
      - key: USE_RIFE
        value: false
